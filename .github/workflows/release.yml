name: Auto Release

on:
  push:
    branches:
      - main
    paths:
      - 'CHANGELOG.md'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse Changelog
        id: parse_changelog
        run: |
          # Extract version from CHANGELOG.md
          VERSION=$(grep -E -m 1 '^## \[[0-9]+\.[0-9]+\.[0-9]+\]' CHANGELOG.md | sed -E 's/## \[(.*)\].*/\1/')
          
          if [ -z "$VERSION" ]; then
            echo "Error: Could not parse version from CHANGELOG.md"
            exit 1
          fi
          
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          
          # Extract release notes for the latest version
          awk '/^## \[[0-9]+/ { if (found == 1) { exit } found = 1; next } found == 1 { print }' CHANGELOG.md > release_notes.md
          echo "Parsed version: $VERSION"

      - name: Check if tag exists
        id: tag_check
        run: |
          VERSION="${{ steps.parse_changelog.outputs.VERSION }}"
          # Check remote tags
          if git ls-remote --tags origin refs/tags/$VERSION | grep -q "refs/tags/$VERSION"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $VERSION already exists."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $VERSION does not exist."
          fi

      - name: Create Release
        if: steps.tag_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.parse_changelog.outputs.VERSION }}"
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes-file release_notes.md \
            --target main
